<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>PicoServer 文档站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0f0f1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .box {
            text-align: center;
            background: #1a1a2e;
            padding: clamp(30px, 8vw, 50px) clamp(20px, 6vw, 40px);
            border-radius: 28px;
            border: 1px solid #2d2d44;
            max-width: 500px;
            width: 100%;
            margin: 16px;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.4);
        }

        .logo {
            font-size: clamp(48px, 15vw, 72px);
            margin-bottom: 16px;
        }

        h1 {
            color: #ffffff;
            margin: 0 0 12px 0;
            font-weight: 600;
            font-size: clamp(22px, 6vw, 28px);
            letter-spacing: -0.3px;
        }

        p {
            color: #a0a0c0;
            font-size: clamp(16px, 4.5vw, 18px);
            margin: 0;
            line-height: 1.5;
        }

        .status {
            display: inline-block;
            background: #2a2a44;
            border-radius: 40px;
            padding: 6px 18px;
            font-size: clamp(12px, 3.5vw, 14px);
            color: #f0c040;
            margin-top: 24px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">📄</div>
        <h1>PicoServer 文档站</h1>
        <p>正在维护升级中</p>
        <div class="status">⚙️ 预计很快恢复</div>
    </div>
</body>
