<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>PicoServer 文档站</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f0f1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .box {
            text-align: center;
            background: #1a1a2e;
            padding: 40px 30px;
            border-radius: 24px;
            border: 1px solid #2d2d44;
            max-width: 500px;
        }
        h1 {
            color: #ffffff;
            margin: 0 0 12px 0;
            font-weight: 600;
            font-size: 28px;
        }
        .logo {
            font-size: 64px;
            margin-bottom: 20px;
        }
        p {
            color: #a0a0c0;
            font-size: 18px;
            margin: 0;
            line-height: 1.5;
        }
        .status {
            display: inline-block;
            background: #2a2a44;
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 13px;
            color: #f0c040;
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">📄</div>
        <h1>PicoServer 文档站</h1>
        <p>正在维护升级中</p>
        <div class="status">⚙️ 预计很快恢复</div>
    </div>
</body>
</html>
